name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      # Formatting and clippy lint anneal's own Rust — no sandbox or toolchain
      # manifest needed (these don't run anneal actions). `-D warnings` makes the
      # gate real; the workspace allows `result_large_err` (see root Cargo.toml).
      - name: rustfmt
        run: nix develop --command cargo fmt --check

      - name: clippy
        run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      # The macOS host has direct network, so it carries the network-gated
      # tests (fetch mode + native_libs, against static.crates.io) — set
      # ANNEAL_NETWORK_TESTS so they actually run instead of silently skipping
      # (the gate that kept fetch mode's regressions invisible). #[ignore]d
      # tests still need --ignored and stay opt-in.
      - name: Rust tests (macOS host)
        if: matrix.os == 'macos-15'
        env:
          ANNEAL_NETWORK_TESTS: "1"
        run: nix develop --command cargo test

      - name: Resolve toolchain manifest
        if: matrix.os == 'ubuntu-24.04'
        id: toolchain_manifest
        run: echo "path=$(nix build .#toolchain-manifest --print-out-paths --no-link)" >> "$GITHUB_OUTPUT"

      - name: Resolve Nix dev PATH
        if: matrix.os == 'ubuntu-24.04'
        id: nix_dev_path
        run: nix develop --command sh -c 'printf "path=%s\n" "$PATH" >> "$GITHUB_OUTPUT"'

      # Hosted Ubuntu can have `bwrap` installed but still fail Anneal's sealed
      # network namespace probe. Run Linux cargo tests in a privileged container
      # and mount the host Nix store so rule toolchains stay manifest-resolved.
      # The outer test process also gets the Nix dev PATH because fixture setup
      # shells out to tools such as cargo and pnpm before Anneal actions run.
      - name: Rust tests (Linux sandbox container)
        if: matrix.os == 'ubuntu-24.04'
        env:
          ANNEAL_TOOLCHAIN_MANIFEST: ${{ steps.toolchain_manifest.outputs.path }}
          ANNEAL_LINUX_TEST_PATH: ${{ steps.nix_dev_path.outputs.path }}
          ANNEAL_LINUX_SANDBOX_COMMAND: cargo test
        run: ./scripts/test-linux-sandbox-docker.sh

  linux-sandbox-docker:
    name: linux sandbox docker
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Linux hermeticity tests
        run: ./scripts/test-linux-sandbox-docker.sh
